# ================================
# BASE A - Dados Principais
# ================================
spring.datasource.primary.url=jdbc:h2:mem:baseA;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.primary.jdbc-url=jdbc:h2:mem:baseA;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.primary.driver-class-name=org.h2.Driver
spring.datasource.primary.username=sa
spring.datasource.primary.password=

# ================================
# BASE B - Auditoria/Log
# ================================
spring.datasource.audit.url=jdbc:h2:mem:baseB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.audit.jdbc-url=jdbc:h2:mem:baseB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.audit.driver-class-name=org.h2.Driver
spring.datasource.audit.username=sa
spring.datasource.audit.password=

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================================
# H2 Console
# ================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ================================
# Segurança JWT
# ================================
jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
jwt.expiration=86400000

# ================================
# Aplicacao
# ================================
spring.application.name=veiculos3
server.port=8080
# Allow larger HTTP headers (bytes). Default is often 8KB; increase to 16KB to avoid "Request header is too large".
server.tomcat.max-http-header-size=16384